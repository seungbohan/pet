# HTTP: redirect to HTTPS
server {
    listen 80;
    server_name withpet.shop www.withpet.shop 3.39.125.216;

    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name withpet.shop www.withpet.shop;

    ssl_certificate /etc/letsencrypt/live/withpet.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/withpet.shop/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # React frontend static files
    root /home/ec2-user/withpet-frontend;
    index index.html;

    # Static files (ads.txt, robots.txt, sitemap, etc.)
    location ~* ^/(ads\.txt|robots\.txt|favicon\.svg|og-image\.png|icons\.svg)$ {
        try_files $uri =404;
    }

    # Sitemap (served by backend)
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        client_max_body_size 30M;
    }

    # OAuth2 redirect
    location /oauth2/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
