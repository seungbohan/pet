# [SECURITY] 주의: 프로덕션 환경에서는 시크릿을 이 파일에 직접 넣지 마세요.
# Docker Secrets, .env 파일(gitignore 필수), 또는 환경변수 관리 도구를 사용하세요.
# 아래 ${VARIABLE:-default} 패턴은 환경변수가 없을 때만 기본값을 사용합니다.
# 프로덕션 배포 시 반드시 환경변수를 설정하세요.
version: '3.8'

services:
  withpet-db:
    image: mariadb:10.11
    container_name: withpet-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme_root}
      MYSQL_DATABASE: withpet
      MYSQL_USER: ${DB_USER:-withpet}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme_db}
    volumes:
      - withpet-db-data:/var/lib/mysql
    networks:
      - withpet-net
    # [SECURITY] 내부 네트워크만 접근 가능 - 포트 노출 없음
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u${DB_USER:-withpet}", "-p${DB_PASSWORD:-changeme_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  withpet-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: withpet-backend
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mariadb://withpet-db:3306/withpet?characterEncoding=UTF-8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-withpet}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-changeme_db}
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_at_least_32_chars}
      PET_API_KEY: ${PET_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-https://withpet.shop}
      NAVER_MAPS_CLIENT_ID: ufwzhw6j2z
      NAVER_MAPS_CLIENT_SECRET: ${NAVER_MAPS_CLIENT_SECRET}
      JAVA_OPTS: -Xms64m -Xmx192m -XX:+UseSerialGC -XX:MaxMetaspaceSize=96m
    mem_limit: 384m
    volumes:
      - /home/ec2-user/upload:/app/upload
    depends_on:
      withpet-db:
        condition: service_healthy
    networks:
      - withpet-net

volumes:
  withpet-db-data:

networks:
  withpet-net:
    driver: bridge
