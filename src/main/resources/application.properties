spring.application.name=portfolio
spring.profiles.active=dev
spring.profiles.group.dev=oauth

# [SECURITY] ddl-auto는 dev에서만 update, prod에서는 validate 사용 권장 (MEDIUM-4)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.org.springframework.security.web=trace
logging.level.org.zerock=debug

api.serviceKey=${env.PET_API_KEY}

jwt.secret=${env.JWT_SECRET}
# [SECURITY] Access Token 만료 2시간으로 단축 (MEDIUM-1 수정) - Refresh Token 도입 권장
jwt.expiration=7200

frontend.url=${env.FRONTEND_URL}

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Naver Maps Geocoding
naver.maps.client-id=${NAVER_MAPS_CLIENT_ID:ufwzhw6j2z}
naver.maps.client-secret=${NAVER_MAPS_CLIENT_SECRET:}
