spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/withpet?characterEncoding=UTF-8&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:withpet}
# [SECURITY] 기본값에 실제 비밀번호를 넣지 마세요 - 환경변수 필수
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ddl-auto=update for now (new columns added), switch to validate after migration
spring.jpa.hibernate.ddl-auto=update

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.location=/app/upload/tmp

org.zerock.upload.path=/app/upload

# Override env. prefix vars with system env vars for Docker
api.serviceKey=${PET_API_KEY}
jwt.secret=${JWT_SECRET}
# [SECURITY] Access Token 만료 2시간 (MEDIUM-1 수정)
jwt.expiration=7200
frontend.url=${FRONTEND_URL:https://withpet.shop}

spring.jpa.show-sql=false
logging.level.org.springframework.security.web=info
logging.level.org.zerock=info

# [SECURITY] 에러 상세 정보 숨기기
server.error.include-stacktrace=never
server.error.include-message=never
